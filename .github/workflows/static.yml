# 1. Update the deploy.yml file in your repository

name: Deploy Static Content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      # 💥 CRITICAL FIX: Tell the actions to work in the 'client' directory
      # This is where your package.json (and thus, your npm scripts) is located.
      - name: Install dependencies and Build
        run: |
          npm install
          npm run build
        working-directory: ./client  # <--- THIS IS THE KEY CHANGE

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      # 💥 CRITICAL FIX: Tell the action where to find the static files to upload
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This path must be relative to the root of the repository.
          # Since the build output is 'dist/public' inside 'client', 
          # the final path is 'client/dist/public'.
          path: './client/dist/public' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
